<script>
  // -------------------------------------------------------------
  // Convert kramdown's <script type="math/tex"> output into
  // \( ... \) / $$ ... $$ that MathJax v3 can find.
  // Kramdown emits these script tags when math_engine is set;
  // MathJax v3 doesn't read them natively.
  // -------------------------------------------------------------
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('script[type^="math/tex"]').forEach(function (el) {
      var display = el.type.indexOf('mode=display') > -1;
      var tex = el.textContent;
      var replacement = document.createElement('span');
      replacement.textContent = display ? '$$' + tex + '$$' : '\\(' + tex + '\\)';
      el.parentNode.replaceChild(replacement, el);
    });
  });

  window.MathJax = {
    loader: {
      load: ['[tex]/ams', '[tex]/cancel', '[tex]/mathtools', '[tex]/physics', '[tex]/color']
    },
    tex: {
      packages: { '[+]': ['ams', 'cancel', 'mathtools', 'physics', 'color'] },
      inlineMath:  [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      macros: {
        // blackboard
        "RR": "\\mathbb{R}", "CC": "\\mathbb{C}", "ZZ": "\\mathbb{Z}",
        "QQ": "\\mathbb{Q}", "NN": "\\mathbb{N}", "FF": "\\mathbb{F}",
        "PP": "\\mathbb{P}", "HH": "\\mathbb{H}", "AA": "\\mathbb{A}",
        "BA": "\\mathbb{A}", "BC": "\\mathbb{C}", "BQ": "\\mathbb{Q}",
        "BR": "\\mathbb{R}", "BZ": "\\mathbb{Z}", "BF": "\\mathbb{F}",
        "BH": "\\mathbb{H}", "BP": "\\mathbb{P}", "BN": "\\mathbb{N}",
        // calligraphic
        "cA": "\\mathcal{A}", "cB": "\\mathcal{B}", "cC": "\\mathcal{C}",
        "cD": "\\mathcal{D}", "cE": "\\mathcal{E}", "cF": "\\mathcal{F}",
        "cG": "\\mathcal{G}", "cH": "\\mathcal{H}", "cI": "\\mathcal{I}",
        "cJ": "\\mathcal{J}", "cK": "\\mathcal{K}", "cL": "\\mathcal{L}",
        "cM": "\\mathcal{M}", "cN": "\\mathcal{N}", "cO": "\\mathcal{O}",
        "cP": "\\mathcal{P}", "cQ": "\\mathcal{Q}", "cR": "\\mathcal{R}",
        "cS": "\\mathcal{S}", "cT": "\\mathcal{T}", "cU": "\\mathcal{U}",
        "cV": "\\mathcal{V}", "cX": "\\mathcal{X}", "cY": "\\mathcal{Y}",
        "Hcal": "\\mathcal{H}", "Lcal": "\\mathcal{L}",
        // operators
        "GL": "\\operatorname{GL}", "SL": "\\operatorname{SL}",
        "SO": "\\operatorname{SO}", "SU": "\\operatorname{SU}",
        "Sp": "\\operatorname{Sp}", "Aut": "\\operatorname{Aut}",
        "End": "\\operatorname{End}", "Hom": "\\operatorname{Hom}",
        "Ext": "\\operatorname{Ext}", "Tor": "\\operatorname{Tor}",
        "Spec": "\\operatorname{Spec}", "Proj": "\\operatorname{Proj}",
        "Tr": "\\operatorname{Tr}", "im": "\\operatorname{im}",
        "coker": "\\operatorname{coker}", "rank": "\\operatorname{rank}",
        "id": "\\operatorname{id}", "sgn": "\\operatorname{sgn}",
        "Sh": "\\operatorname{Sh}",
        // shortcuts
        "abs":   ["\\left\\lvert #1 \\right\\rvert", 1],
        "norm":  ["\\left\\lVert #1 \\right\\rVert", 1],
        "set":   ["\\left\\{ #1 \\right\\}", 1],
        "inner": ["\\left\\langle #1 \\right\\rangle", 1],
        "into":  "\\hookrightarrow",
        "onto":  "\\twoheadrightarrow",
        "isom":  "\\xrightarrow{\\sim}"
      }
    },
    svg: { fontCache: 'global', scale: 1.0 },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js"></script>
