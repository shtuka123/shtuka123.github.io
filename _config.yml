title: ani
description: Personal site.
url: ""
baseurl: ""
author: ani
email: you@example.com
github_user: yourname

markdown: kramdown
kramdown:
  input: kramdown
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    css: class
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  hard_wrap: false
  # Don't try to process math — MathJax handles it via \(...\) and \[...\]
  math_engine: null
  parse_block_html: true
  parse_span_html: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /blog/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - .jekyll-cache

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml