title: ani
description: Personal site.
url: ""
baseurl: ""
author: ani
email: you@example.com
github_user: yourname

markdown: kramdown
kramdown:
  input: kramdown
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    css: class
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  hard_wrap: false
  # Use kramdown's math engine so $...$ and $$...$$ are recognized as
  # math (kramdown emits <script type="math/tex"> tags). The MathJax
  # include converts these to \(...\) and $$...$$ on page load so
  # MathJax v3 picks them up.
  math_engine: mathjax
  parse_block_html: true
  parse_span_html: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /blog/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - .jekyll-cache

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml